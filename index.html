<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Valentine?</title>
  <style>
    :root{
      --bg1:#ffe7ef;
      --bg2:#ffd2e1;
      --card:rgba(255,255,255,.78);
      --text:#1f2937;
      --yes:#22c55e;
      --no:#ef4444;
      --shadow:0 18px 55px rgba(0,0,0,.14);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    body{
      overflow:hidden;
      background:radial-gradient(circle at 20% 20%, var(--bg1), var(--bg2));
      display:grid;
      place-items:center;
      color:var(--text);
      user-select:none;
    }
    .card{
      width:min(620px,92vw);
      padding:28px 22px 22px;
      border-radius:22px;
      background:var(--card);
      backdrop-filter: blur(10px);
      box-shadow:var(--shadow);
      text-align:center;
    }
    h1{
      margin:0 0 16px;
      font-size:clamp(24px,3.6vw,36px);
      letter-spacing:.2px;
    }
    .arena{
      position:relative;
      height:280px;
      border-radius:18px;
      background:rgba(255,255,255,.55);
      overflow:hidden;
      border:1px solid rgba(0,0,0,.06);
    }
    .btn{
      border:0;
      padding:14px 22px;
      border-radius:999px;
      font-weight:800;
      font-size:16px;
      cursor:pointer;
      box-shadow:0 10px 20px rgba(0,0,0,.12);
      transition:transform .12s ease, filter .12s ease;
      will-change:transform,left,top;
      touch-action:manipulation;
    }
    .btn:active{transform:translateY(1px) scale(.99)}
    #yesBtn{
      background:linear-gradient(135deg,#34d399,var(--yes));
      color:#fff;
      position:absolute;
      left:50%;
      top:68%;
      transform:translate(-120%,-50%);
    }
    #noBtn{
      background:linear-gradient(135deg,#fb7185,var(--no));
      color:#fff;
      position:absolute;
      left:50%;
      top:68%;
      transform:translate(20%,-50%);
    }

    /* Overlay */
    .overlay{
      position:fixed;
      inset:0;
      display:none;
      place-items:center;
      background:rgba(0,0,0,.35);
      z-index:10;
      padding:18px;
    }
    .overlay.show{display:grid}
    .modal{
      width:min(720px,94vw);
      border-radius:22px;
      background:rgba(255,255,255,.9);
      box-shadow:var(--shadow);
      padding:18px 16px 14px;
      position:relative;
      overflow:hidden;
      text-align:center;
    }

    /* Confetti */
    .confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden}
    .confetti span{
      position:absolute;top:-24px;
      width:10px;height:16px;border-radius:3px;
      opacity:.95;
      animation:fall linear forwards;
    }
    @keyframes fall{
      to{transform:translateY(120vh) rotate(520deg)}
    }

    /* Funny “GIF-like” dance */
    .stage{
      height:300px;
      display:grid;
      place-items:center;
    }
    .dude{
      width:220px;
      height:240px;
      position:relative;
      filter: drop-shadow(0 14px 18px rgba(0,0,0,.16));
      animation: hop .42s infinite alternate ease-in-out;
    }
    @keyframes hop{
      0%{transform:translateY(2px) rotate(-2deg)}
      100%{transform:translateY(-14px) rotate(2deg)}
    }

    .bubble{
      position:absolute;
      top:-6px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(255,255,255,.95);
      border:1px solid rgba(0,0,0,.08);
      border-radius:999px;
      padding:10px 14px;
      font-weight:800;
      font-size:16px;
      white-space:nowrap;
      box-shadow:0 10px 18px rgba(0,0,0,.10);
    }
    .bubble:after{
      content:"";
      position:absolute;
      left:50%;
      bottom:-8px;
      transform:translateX(-50%);
      width:16px;height:16px;
      background:rgba(255,255,255,.95);
      border-left:1px solid rgba(0,0,0,.08);
      border-bottom:1px solid rgba(0,0,0,.08);
      rotate:45deg;
      border-bottom-left-radius:4px;
    }

    .head{
      width:110px;height:110px;
      background:#ffe4e6;
      border:3px solid rgba(0,0,0,.08);
      border-radius:28px;
      position:absolute;
      left:50%;top:58px;
      transform:translateX(-50%);
    }
    .eye{
      width:14px;height:18px;border-radius:999px;
      background:#111;
      position:absolute;top:42px;
      animation: blink 3.2s infinite;
    }
    .eye.l{left:32px}
    .eye.r{right:32px}
    @keyframes blink{
      0%,96%,100%{transform:scaleY(1)}
      97%{transform:scaleY(.1)}
      98%{transform:scaleY(1)}
    }
    .smirk{
      width:54px;height:26px;
      border:4px solid #111;
      border-top:0;border-left:0;border-right:0;
      border-radius:0 0 999px 999px;
      position:absolute;left:50%;top:72px;
      transform:translateX(-50%) rotate(-6deg);
    }

    .body{
      width:150px;height:110px;
      background:#111827;
      border-radius:28px;
      position:absolute;
      left:50%;top:140px;
      transform:translateX(-50%);
    }

    .arm{
      width:82px;height:18px;
      background:#fecaca;
      border-radius:999px;
      position:absolute;top:160px;
    }
    .arm.l{left:8px; transform-origin:72px 50%; animation: waveL .18s infinite alternate ease-in-out;}
    .arm.r{right:8px; transform-origin:10px 50%; animation: waveR .18s infinite alternate ease-in-out;}
    @keyframes waveL{0%{transform:rotate(-22deg)}100%{transform:rotate(6deg)}}
    @keyframes waveR{0%{transform:rotate(22deg)}100%{transform:rotate(-6deg)}}

    .leg{
      width:18px;height:64px;
      background:#111827;
      border-radius:999px;
      position:absolute;top:214px;
      left:50%;
    }
    .leg.l{transform:translateX(-46px); animation: kickL .22s infinite alternate ease-in-out;}
    .leg.r{transform:translateX(28px); animation: kickR .22s infinite alternate ease-in-out;}
    @keyframes kickL{0%{rotate:-10deg}100%{rotate:24deg}}
    @keyframes kickR{0%{rotate:10deg}100%{rotate:-24deg}}

    .rose{
      position:absolute;
      right:10px;
      bottom:8px;
      font-size:44px;
      animation: twirl .35s infinite alternate ease-in-out;
      transform-origin: 50% 80%;
    }
    @keyframes twirl{
      0%{transform:rotate(-8deg) translateY(0)}
      100%{transform:rotate(10deg) translateY(-6px)}
    }

    .close{
      margin-top:8px;
      background:#111;
      color:#fff;
      padding:12px 16px;
      border-radius:999px;
      border:0;
      font-weight:800;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hey beautiful, will you be my valentine? 💘</h1>

    <div class="arena" id="arena">
      <button class="btn" id="yesBtn">Yes</button>
      <button class="btn" id="noBtn">No</button>
    </div>
  </div>

  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="modal">
      <div class="confetti" id="confetti"></div>

      <div class="stage">
        <div class="dude" aria-label="happy dance">
          <div class="bubble">see you soon 🌹💐</div>

          <div class="head">
            <div class="eye l"></div>
            <div class="eye r"></div>
            <div class="smirk"></div>
          </div>

          <div class="arm l"></div>
          <div class="arm r"></div>

          <div class="body"></div>

          <div class="leg l"></div>
          <div class="leg r"></div>

          <div class="rose">💐</div>
        </div>
      </div>

      <button class="close" id="closeBtn">Close</button>
    </div>
  </div>

  <script>
    const arena = document.getElementById('arena');
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const overlay = document.getElementById('overlay');
    const closeBtn = document.getElementById('closeBtn');
    const confetti = document.getElementById('confetti');

    function placeNoRandom() {
      const a = arena.getBoundingClientRect();
      const b = noBtn.getBoundingClientRect();
      const pad = 14;

      const maxX = a.width - b.width - pad;
      const maxY = a.height - b.height - pad;

      const x = pad + Math.random() * Math.max(0, maxX - pad);
      const y = pad + Math.random() * Math.max(0, maxY - pad);

      noBtn.style.left = x + 'px';
      noBtn.style.top  = y + 'px';
      noBtn.style.transform = 'translate(0,0)';
    }

    function dodge(clientX, clientY) {
      const a = arena.getBoundingClientRect();
      const b = noBtn.getBoundingClientRect();

      const mx = clientX - a.left;
      const my = clientY - a.top;

      const bx = (b.left - a.left) + b.width / 2;
      const by = (b.top  - a.top ) + b.height / 2;

      const dx = bx - mx;
      const dy = by - my;
      const dist = Math.hypot(dx, dy);

      const danger = 125;
      if (dist > danger) return;

      const push = (danger - dist) * 1.9 + 28;
      const ux = dx / (dist || 1);
      const uy = dy / (dist || 1);

      let newLeft = (b.left - a.left) + ux * push;
      let newTop  = (b.top  - a.top ) + uy * push;

      const pad = 10;
      newLeft = Math.max(pad, Math.min(newLeft, a.width  - b.width  - pad));
      newTop  = Math.max(pad, Math.min(newTop,  a.height - b.height - pad));

      // If it gets cornered, teleport
      if (Math.random() < 0.18) {
        placeNoRandom();
        return;
      }

      noBtn.style.left = newLeft + 'px';
      noBtn.style.top  = newTop + 'px';
      noBtn.style.transform = 'translate(0,0)';
    }

    function launchConfetti() {
      confetti.innerHTML = '';
      const pieces = 75;
      const emojis = ['💖','✨','💘','🎉','🥳','💕','🌹'];

      for (let i = 0; i < pieces; i++) {
        const s = document.createElement('span');
        const isEmoji = Math.random() < 0.4;

        if (isEmoji) {
          s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          s.style.width = 'auto';
          s.style.height = 'auto';
          s.style.fontSize = (14 + Math.random() * 14) + 'px';
          s.style.background = 'transparent';
        } else {
          s.style.background = `hsl(${Math.random() * 360}, 90%, 65%)`;
          s.style.width = (8 + Math.random() * 10) + 'px';
          s.style.height = (10 + Math.random() * 14) + 'px';
        }

        s.style.left = (Math.random() * 100) + 'vw';
        s.style.animationDuration = (1.6 + Math.random() * 1.7) + 's';
        s.style.animationDelay = (Math.random() * 0.25) + 's';
        confetti.appendChild(s);
      }
    }

    arena.addEventListener('mousemove', (e) => dodge(e.clientX, e.clientY));
    arena.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      dodge(t.clientX, t.clientY);
    }, { passive: true });
    arena.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      dodge(t.clientX, t.clientY);
    }, { passive: true });

    noBtn.addEventListener('mouseenter', placeNoRandom);
    noBtn.addEventListener('click', (e) => {
      e.preventDefault();
      placeNoRandom();
    });

    yesBtn.addEventListener('click', () => {
      overlay.classList.add('show');
      overlay.setAttribute('aria-hidden', 'false');
      launchConfetti();
    });

    closeBtn.addEventListener('click', () => {
      overlay.classList.remove('show');
      overlay.setAttribute('aria-hidden', 'true');
    });

    requestAnimationFrame(() => {
      const a = arena.getBoundingClientRect();
      const y = yesBtn.getBoundingClientRect();
      yesBtn.style.left = (a.width/2 - y.width - 14) + 'px';
      yesBtn.style.top  = (a.height*0.68 - y.height/2) + 'px';
      yesBtn.style.transform = 'translate(0,0)';
      placeNoRandom();
    });
  </script>
</body>
</html>
